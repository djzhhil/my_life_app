server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/my_life_app?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: store.scserver.my_life_app.entity
  configuration:
    map-underscore-to-camel-case: true

# JWT 配置
jwt:
  secret: mySecretKey12345678901234567890123456789012345678901234567890
  expiration: 86400000  # 24小时过期